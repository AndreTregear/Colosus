# =============================================================================
# NETWORKS
# =============================================================================
networks:
  yaya-net:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # Core infrastructure
  pgdata:
  redisdata:
  miniodata:
  # Autobot
  autobot-uploads:
  # Caddy TLS
  caddy_data:
  caddy_config:
  # Business services
  invoiceshelf-storage:
  # Phase 2 (uncomment when enabling)
  # erpnext-db:
