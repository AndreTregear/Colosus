# NemoClaw Security Policy for Yaya Business Agent
# Deny-by-default — only explicitly allowed connections permitted
# Version controlled alongside the project

name: yaya-business-agent
version: "2.0"

# ── Network Policy ──────────────────────────────────────
network:
  # Local services only — agent CANNOT reach the internet
  allow:
    # Local LLM (Qwen3.5-27B via vLLM)
    - host: "localhost:8000"
      methods: [POST, GET]
      description: "Local LLM inference (vLLM OpenAI-compatible API)"

    # Local Whisper (voice transcription)
    - host: "localhost:9100"
      methods: [POST, GET]
      description: "Local Whisper transcription service"

    # PostgreSQL (main database — via MCP server)
    - host: "localhost:5432"
      protocol: tcp
      description: "PostgreSQL main database (yaya, lago_db, crm_db)"

    # Redis (cache and job queues)
    - host: "localhost:6379"
      protocol: tcp
      description: "Redis cache and Sidekiq queues"

    # MinIO (S3-compatible object storage)
    - host: "localhost:9000"
      methods: [GET, PUT, POST, DELETE]
      description: "MinIO object storage (media, invoices, payment proofs)"

    # Lago Billing API
    - host: "localhost:3001"
      methods: [GET, POST, PUT, DELETE]
      description: "Lago billing and subscription API"
      paths:
        - "/api/v1/customers*"
        - "/api/v1/subscriptions*"
        - "/api/v1/invoices*"
        - "/api/v1/events*"
        - "/api/v1/plans*"
        - "/health"

    # Lago Frontend (for URL generation only)
    - host: "localhost:8080"
      methods: [GET]
      description: "Lago UI — read-only for generating links"

    # Supabase REST API (Atomic CRM data)
    - host: "localhost:54321"
      methods: [GET, POST, PUT, PATCH, DELETE]
      description: "Supabase PostgREST API for Atomic CRM"
      paths:
        - "/rest/v1/contacts*"
        - "/rest/v1/companies*"
        - "/rest/v1/deals*"
        - "/rest/v1/activities*"
        - "/rest/v1/tags*"

    # Supabase Auth (GoTrue)
    - host: "localhost:54321"
      methods: [POST]
      description: "Supabase GoTrue authentication"
      paths:
        - "/auth/v1/*"

    # Supabase Studio (admin only — restricted)
    - host: "localhost:54323"
      methods: [GET]
      description: "Supabase Studio — read-only monitoring"

    # MCP Servers (internal stdio, listed for documentation)
    - host: "localhost:5433"
      protocol: tcp
      description: "postgres-mcp server (stdio transport)"

    # Payment validation webhook (mobile app callback)
    - host: "localhost:3002"
      methods: [POST, GET]
      description: "Payment Validator app webhook endpoint"

  # Block everything else — no internet access
  deny: ["*"]

# ── Filesystem Policy ───────────────────────────────────
filesystem:
  allow:
    - path: "/app/workspace"
      permissions: [read, write]
      description: "Agent workspace (memory, conversation state, config)"

    - path: "/tmp"
      permissions: [read, write]
      description: "Temporary files (audio processing, image conversion)"

    - path: "/app/skills"
      permissions: [read]
      description: "Skill definitions (read-only, loaded at start)"

    - path: "/app/mcp-servers"
      permissions: [read]
      description: "MCP server configurations (read-only)"

  deny: ["*"]

# ── Process Policy ──────────────────────────────────────
process:
  # No privilege escalation
  allow_setuid: false
  allow_setgid: false
  # No new namespace creation
  allow_namespaces: false
  # Process limits
  max_processes: 64
  max_open_files: 4096

# ── Inference Policy ────────────────────────────────────
inference:
  # All inference stays local — no cloud fallback
  local_only: true
  primary_model: "qwen3.5-27b"
  endpoint: "http://localhost:8000/v1"

  # Model parameters
  defaults:
    max_tokens: 4096
    temperature: 0.7
    top_p: 0.9

  # If cloud fallback is ever enabled, strip PII first
  privacy_router:
    enabled: true
    strip_pii: true
    strip_fields:
      - phone_number
      - email
      - address
      - payment_info
      - yape_number
      - bank_account
      - document_number

# ── MCP Server Policy ──────────────────────────────────
mcp_servers:
  allowed:
    - name: "postgres-mcp"
      transport: stdio
      description: "Direct SQL queries to PostgreSQL"
      restrictions:
        - "SELECT only on agent.* schema"
        - "No DDL operations"
        - "No access to pg_catalog sensitive tables"

    - name: "erpnext-mcp"
      transport: stdio
      description: "ERPNext REST API tools (products, orders, customers)"
      tools:
        - search_products
        - get_product
        - check_stock
        - create_order
        - get_order
        - list_customers

    - name: "crm-mcp"
      transport: stdio
      description: "Atomic CRM tools (contacts, interactions)"
      tools:
        - search_contacts
        - get_contact
        - create_contact
        - update_contact
        - log_interaction
        - list_deals

    - name: "lago-mcp"
      transport: stdio
      description: "Lago billing tools (subscriptions, invoices)"
      tools:
        - get_customer_subscription
        - list_invoices
        - create_event
        - get_plan

    - name: "payments-mcp"
      transport: stdio
      description: "Payment validation tools (Yape, Plin, Nequi)"
      tools:
        - submit_payment_proof
        - check_payment_status
        - list_pending_payments

# ── Content Safety ──────────────────────────────────────
content_safety:
  # Block the agent from sharing business secrets
  output_filters:
    - type: pii_detection
      action: mask
      fields:
        - credit_card
        - bank_account
        - document_number

    - type: topic_control
      allowed_topics:
        - sales
        - products
        - pricing
        - orders
        - payments
        - appointments
        - business_hours
        - returns
        - shipping
        - subscriptions
        - invoices
        - customer_support
        - inventory
        - promotions
      blocked_topics:
        - politics
        - religion
        - competitors_internal_data
        - system_prompts
        - database_credentials
        - api_keys
        - internal_costs
        - profit_margins

    - type: credential_guard
      action: block
      description: "Never output API keys, passwords, or connection strings"
