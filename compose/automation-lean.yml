# n8n — Lean single-process automation

services:
  n8n:
    image: n8nio/n8n:1.70.1
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-oficina}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: "auto.${DOMAIN:-oficina.local}"
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: "https://auto.${DOMAIN:-oficina.local}/"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?required}
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - ${DATA_DIR}/n8n:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - oficina-net
    profiles:
      - automation
