# Zammad — Helpdesk / Ticketing
# Multi-channel customer support (email, chat, phone, social).
# Zendesk-class features, self-hosted.

services:
  zammad:
    image: ghcr.io/zammad/zammad:6
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DB: zammad
      POSTGRESQL_USER: ${POSTGRES_USER:-oficina}
      POSTGRESQL_PASS: ${POSTGRES_PASSWORD}
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      # Elasticsearch (optional but recommended for search)
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASS: ${ELASTIC_PASSWORD}
      ELASTICSEARCH_SSL: "false"
      # Zammad config
      ZAMMAD_RAILSSERVER_HOST: zammad-railsserver
      ZAMMAD_WEBSOCKET_HOST: zammad-websocket
    ports:
      - "127.0.0.1:3200:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/monitoring/health_check"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - oficina-net
    profiles:
      - helpdesk
