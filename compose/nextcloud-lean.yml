# Nextcloud LEAN — Files, Calendar, Contacts, Talk (video meetings)
# No Collabora (add later), no Redis (use APCu for now)

services:
  nextcloud:
    image: nextcloud:29-apache
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${POSTGRES_USER:-oficina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?required}
      NEXTCLOUD_TRUSTED_DOMAINS: "files.${DOMAIN:-oficina.local} localhost"
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: "files.${DOMAIN:-oficina.local}"
      TRUSTED_PROXIES: caddy
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 5G
    volumes:
      - ${DATA_DIR}/nextcloud/html:/var/www/html
      - ${DATA_DIR}/nextcloud/data:/var/www/html/data
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - oficina-net
    profiles:
      - nextcloud
