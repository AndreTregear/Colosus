# n8n — Workflow Automation
# Visual builder with 400+ integrations and native AI capabilities.
# The automation backbone connecting all Oficina services.

services:
  n8n:
    # Pinned. Bump deliberately after reviewing release notes + security advisories.
    image: n8nio/n8n:1.70.1
    restart: unless-stopped
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-oficina}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Queue mode for reliability
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # URLs
      N8N_HOST: "auto.${DOMAIN:-oficina.local}"
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: "https://auto.${DOMAIN:-oficina.local}/"
      # Encryption key for credentials
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
      # Disable telemetry for air-gapped
      N8N_DIAGNOSTICS_ENABLED: "false"
      # Allow local network access (to reach other Docker services)
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      # Authentik OIDC SSO
      N8N_AUTH_TYPE: oidc
      N8N_AUTH_OIDC_CLIENT_ID: n8n-client
      N8N_AUTH_OIDC_CLIENT_SECRET: ${N8N_OIDC_SECRET:-change-me-n8n}
      N8N_AUTH_OIDC_ISSUER: "https://auth.${DOMAIN:-oficina.local}/application/o/n8n/"
      N8N_AUTH_OIDC_ALLOWED_AUDIENCES: n8n-client
      N8N_AUTH_OIDC_SCOPE: "openid email profile"
    volumes:
      - ${DATA_DIR}/n8n:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    networks:
      - oficina-net
    profiles:
      - automation

  # n8n worker (processes queued executions)
  n8n-worker:
    image: n8nio/n8n:1.70.1
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-oficina}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - ${DATA_DIR}/n8n:/home/node/.n8n
    depends_on:
      - n8n
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - oficina-net
    profiles:
      - automation
