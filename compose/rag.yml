# RAGFlow — Document AI / Knowledge Base
# Retrieval-Augmented Generation engine.
# Indexes business documents for AI-powered semantic search.

services:
  ragflow:
    image: infiniflow/ragflow:v0.16.0
    restart: unless-stopped
    environment:
      # Elasticsearch backend
      ES_HOST: elasticsearch
      ES_PORT: 9200
      ES_USER: elastic
      ES_PASSWORD: ${ELASTIC_PASSWORD}
      # LLM backend (use the local vLLM)
      LLM_BASE_URL: http://vllm:8000/v1
      LLM_API_KEY: not-needed
      LLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-32B-Instruct-AWQ}
      # Embedding model (runs on CPU or shares GPU)
      EMBEDDING_MODEL: BAAI/bge-large-en-v1.5
    volumes:
      - ${DATA_DIR}/ragflow:/ragflow/data
      - ../config/ragflow:/ragflow/conf:ro
    ports:
      - "127.0.0.1:8084:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - oficina-net
    profiles:
      - rag
