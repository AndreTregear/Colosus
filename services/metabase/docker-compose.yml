version: "3.9"

# Metabase — Business Intelligence & Analytics
# Upstream: https://github.com/metabase/metabase
# Docs: https://www.metabase.com/docs/latest/

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MB_DB_USER:-metabase}
      POSTGRES_PASSWORD: ${MB_DB_PASS:-metabase}
      POSTGRES_DB: ${MB_DB_DBNAME:-metabase}
    volumes:
      - metabase-db:/var/lib/postgresql/data
    networks:
      - metabase

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "${MB_PORT:-3001}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: database
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${MB_DB_DBNAME:-metabase}
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASS:-metabase}
      MB_EMAIL_SMTP_HOST: ${MB_EMAIL_SMTP_HOST:-}
      MB_EMAIL_SMTP_PORT: ${MB_EMAIL_SMTP_PORT:-}
    depends_on:
      - database
    networks:
      - metabase

volumes:
  metabase-db:

networks:
  metabase:
