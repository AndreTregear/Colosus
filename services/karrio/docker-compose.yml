version: "3.9"

# Karrio — Universal Shipping API
# Upstream: https://github.com/karrioapi/karrio
# Docs: https://docs.karrio.io/

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-karrio}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-karrio}
      POSTGRES_DB: ${DATABASE_NAME:-karrio}
    volumes:
      - karrio-db:/var/lib/postgresql/data
    networks:
      - karrio

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - karrio

  api:
    image: karrio.docker.scarf.sh/karrio/server:${KARRIO_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${KARRIO_API_PORT:-5002}:5002"
    environment:
      DEBUG_MODE: ${DEBUG_MODE:-False}
      DETACHED_WORKER: "True"
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-karrio}
      DATABASE_USER: ${DATABASE_USER:-karrio}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-karrio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    depends_on:
      - database
      - redis
    networks:
      - karrio

  worker:
    image: karrio.docker.scarf.sh/karrio/server:${KARRIO_TAG:-latest}
    restart: unless-stopped
    command: ["worker"]
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-karrio}
      DATABASE_USER: ${DATABASE_USER:-karrio}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-karrio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - database
      - redis
    networks:
      - karrio

  dashboard:
    image: karrio.docker.scarf.sh/karrio/dashboard:${KARRIO_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${KARRIO_DASHBOARD_PORT:-3005}:3000"
    environment:
      KARRIO_PUBLIC_URL: ${KARRIO_PUBLIC_URL:-http://localhost:5002}
    depends_on:
      - api
    networks:
      - karrio

volumes:
  karrio-db:

networks:
  karrio:
