version: "3.9"

# Atomic CRM — Contact & Deal Management
# Upstream: https://github.com/marmelab/atomic-crm
# Stack: React + Vite + Supabase

services:
  crm:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CRM_PORT:-3003}:5173"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SB_PUBLISHABLE_KEY: ${VITE_SB_PUBLISHABLE_KEY}
      VITE_IS_DEMO: "false"
    networks:
      - crm

networks:
  crm:
